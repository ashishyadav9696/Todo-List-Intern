<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>internSpark - Premium Authentication</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-canvas: #06070a;
      --bg-gradient: radial-gradient(circle at 50% 50%, #0d0e15 0%, #06070a 100%);
      --glass-card: rgba(13, 17, 28, 0.45);
      --glass-border: rgba(255, 255, 255, 0.05);
      --glass-highlight: rgba(255, 255, 255, 0.02);
      
      --text-main: #f8fafc;
      --text-muted: #64748b;
      --text-glow: rgba(255, 255, 255, 0.9);
      
      --accent-gold: #ffc72c;
      --accent-gold-rgb: 255, 199, 44;
      --accent-gold-glow: rgba(255, 199, 44, 0.25);
      --accent-gold-gradient: linear-gradient(135deg, #ffc72c 0%, #d97706 100%);
      
      --priority-high: #ef4444;
      --logo-foreground: #ffffff;
      --card-radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    body {
      background: var(--bg-canvas);
      background-image: var(--bg-gradient);
      min-height: 100vh;
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      position: relative;
      overflow-x: hidden;
      background-attachment: fixed;
    }

    /* Ambient slowly pulsing decorative background lights */
    .glow-blob {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      filter: blur(140px);
      z-index: -1;
      pointer-events: none;
      opacity: 0.7;
    }

    .glow-blob-1 {
      top: -10%;
      left: -10%;
      background: rgba(255, 199, 44, 0.12); /* Gold glow */
      animation: float-blob-1 25s infinite alternate ease-in-out;
    }

    .glow-blob-2 {
      bottom: -10%;
      right: -10%;
      background: rgba(99, 102, 241, 0.14); /* Indigo glow */
      animation: float-blob-2 25s infinite alternate ease-in-out;
    }

    @keyframes float-blob-1 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, 40px) scale(1.1); }
    }

    @keyframes float-blob-2 {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-60px, -40px) scale(1.15); }
    }

    /* Auth Container */
    .auth-wrapper {
      width: 100%;
      max-width: 440px;
      perspective: 1000px;
      animation: scaleIn 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scaleIn {
      from { transform: scale(0.97) translateY(20px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* Glass Card */
    .glass-card {
      background: var(--glass-card);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5),
                  inset 0 1px 0 var(--glass-highlight);
      position: relative;
      overflow: hidden;
      width: 100%;
    }

    /* Logo Group */
    .logo-container {
      width: 220px;
      height: 60px;
      margin: 0 auto 1.5rem;
      filter: drop-shadow(0 0 8px rgba(var(--accent-gold-rgb), 0.25));
    }

    .internspark-logo {
      width: 100%;
      height: 100%;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header p {
      color: var(--text-muted);
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    /* Forms */
    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      transition: opacity 0.3s ease;
    }

    .auth-form.hidden {
      display: none;
      opacity: 0;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-left: 0.25rem;
    }

    .input-field {
      width: 100%;
      background: rgba(10, 12, 22, 0.55);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 0.9rem 1.1rem;
      color: white;
      font-size: 0.95rem;
      outline: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    }

    .input-field:focus {
      border-color: var(--accent-gold);
      box-shadow: 0 0 10px rgba(var(--accent-gold-rgb), 0.15);
      background: rgba(10, 12, 22, 0.7);
    }

    .input-field::placeholder {
      color: #475569;
    }

    .btn-submit {
      background: var(--accent-gold-gradient);
      color: #06070a;
      border: none;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      font-weight: 800;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 15px rgba(var(--accent-gold-rgb), 0.2);
      margin-top: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 22px rgba(var(--accent-gold-rgb), 0.4);
      filter: brightness(1.05);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    /* Toggle Link */
    .toggle-auth {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    .toggle-auth span {
      color: var(--accent-gold);
      font-weight: 700;
      cursor: pointer;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .toggle-auth span:hover {
      text-shadow: 0 0 8px rgba(var(--accent-gold-rgb), 0.3);
      text-decoration: underline;
    }

    /* Toast Notification System */
    .toast-container {
      position: fixed;
      top: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      z-index: 9999;
    }

    .toast {
      background: rgba(10, 13, 23, 0.95);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.05);
      color: white;
      padding: 0.9rem 1.25rem;
      border-radius: 14px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transform: translateX(120%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      font-size: 0.9rem;
      font-weight: 500;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast.success { border-left: 4px solid var(--accent-gold); }
    .toast.error { border-left: 4px solid var(--priority-high); }

    .toast-icon {
      flex-shrink: 0;
    }

    .toast.success .toast-icon { color: var(--accent-gold); }
    .toast.error .toast-icon { color: var(--priority-high); }

  </style>
</head>
<body>
  <!-- Background Ambient Gradients -->
  <div class="glow-blob glow-blob-1"></div>
  <div class="glow-blob glow-blob-2"></div>

  <!-- Custom Alerts Toasts Wrapper -->
  <div class="toast-container" id="toast-wrapper"></div>

  <div class="auth-wrapper">
    <div class="glass-card">
      <div class="auth-header">
        <div class="logo-container">
          <svg class="internspark-logo" viewBox="0 0 320 80" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffc72c" />
                <stop offset="100%" stop-color="#d97706" />
              </linearGradient>
            </defs>
            <g transform="translate(10, 5)">
              <path d="M12 60 C15 50 25 35 38 25 C48 18 55 10 58 2 C54 12 45 22 34 32 C22 42 10 52 12 60 Z" fill="#ffc72c" />
              <path d="M6 50 C9 42 18 30 30 22 C40 16 46 10 49 2 C46 10 38 18 28 26 C18 34 8 42 6 50 Z" fill="var(--logo-foreground)" />
              <circle cx="22" cy="24" r="8" fill="var(--logo-foreground)" />
              <g transform="translate(58, 2)">
                <path d="M0 -15 L3 -3 L15 0 L3 3 L0 15 L-3 3 L-15 0 L-3 -3 Z" fill="#ffc72c" />
                <line x1="-8" y1="-8" x2="8" y2="8" stroke="#ffc72c" stroke-width="2.2" stroke-linecap="round" />
                <line x1="8" y1="-8" x2="-8" y2="8" stroke="#ffc72c" stroke-width="2.2" stroke-linecap="round" />
                <circle cx="-12" cy="-6" r="1.5" fill="#ffc72c" />
                <circle cx="10" cy="12" r="1.5" fill="#ffc72c" />
              </g>
            </g>
            <g transform="translate(95, 48)">
              <text x="0" y="0" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="500" fill="var(--logo-foreground)" letter-spacing="-0.03em">intern</text>
              <text x="76" y="0" font-family="'Plus Jakarta Sans', sans-serif" font-size="28" font-weight="800" fill="#ffc72c" letter-spacing="-0.03em">Spark</text>
            </g>
          </svg>
        </div>
        <p id="auth-subtitle">Sign in to your premium workspace</p>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="input-field" placeholder="john@example.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="input-field" placeholder="••••••••" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <!-- Register Form -->
      <form class="auth-form hidden" id="register-form">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input type="text" id="reg-name" class="input-field" placeholder="John Doe" autocomplete="name">
        </div>
        <div class="form-group">
          <label for="reg-email">Email Address</label>
          <input type="email" id="reg-email" class="input-field" placeholder="john@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" class="input-field" placeholder="At least 6 characters" autocomplete="new-password">
        </div>
        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <div class="toggle-auth">
        <p id="toggle-text">Don't have an account? <span id="toggle-btn">Sign Up</span></p>
      </div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    if (localStorage.getItem('authToken')) {
      window.location.href = '/dashboard.html';
    }

    const loginForm = document.getElementById('login-form');
    const registerForm = document.getElementById('register-form');
    const toggleBtn = document.getElementById('toggle-btn');
    const toggleText = document.getElementById('toggle-text');
    const authSubtitle = document.getElementById('auth-subtitle');

    let isLogin = true;

    // Toast Notification logic
    function showToast(message, type = 'success') {
      const wrapper = document.getElementById('toast-wrapper');
      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      
      const icon = type === 'success' ? 
        `<svg style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5px" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>` :
        `<svg style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2.5px" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`;

      toast.innerHTML = `
        <div class="toast-icon">${icon}</div>
        <div>${message}</div>
      `;
      wrapper.appendChild(toast);
      
      setTimeout(() => toast.classList.add('show'), 50);
      
      setTimeout(() => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 400);
      }, 3500);
    }

    // Toggle between Login and Register
    toggleBtn.addEventListener('click', () => {
      isLogin = !isLogin;
      
      if (isLogin) {
        registerForm.classList.add('hidden');
        setTimeout(() => loginForm.classList.remove('hidden'), 50);
        authSubtitle.textContent = 'Sign in to your premium workspace';
        toggleText.innerHTML = `Don't have an account? <span id="toggle-btn" onclick="document.getElementById('toggle-btn').click()">Sign Up</span>`;
      } else {
        loginForm.classList.add('hidden');
        setTimeout(() => registerForm.classList.remove('hidden'), 50);
        authSubtitle.textContent = 'Create your premium workspace';
        toggleText.innerHTML = `Already have an account? <span id="toggle-btn" onclick="document.getElementById('toggle-btn').click()">Sign In</span>`;
      }
      
      // Re-attach listener due to innerHTML replace
      document.getElementById('toggle-btn').addEventListener('click', () => toggleBtn.click());
    });

    // Handle Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Login failed');

        localStorage.setItem('authToken', data.data.token);
        localStorage.setItem('authUser', JSON.stringify({ name: data.data.name, email: data.data.email }));
        
        window.location.href = '/dashboard.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });

    // Handle Register
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        });
        
        const data = await res.json();
        if (!res.ok) throw new Error(data.message || 'Registration failed');

        localStorage.setItem('authToken', data.data.token);
        localStorage.setItem('authUser', JSON.stringify({ name: data.data.name, email: data.data.email }));
        
        window.location.href = '/dashboard.html';
      } catch (err) {
        showToast(err.message, 'error');
      }
    });
  </script>
</body>
</html>
